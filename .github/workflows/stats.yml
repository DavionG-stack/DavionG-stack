name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats image
        run: |
          mkdir -p profile
          curl -o profile/stats.svg "https://github-readme-stats.vercel.app/api?username=DavionG-stack&show_icons=true&theme=tokyonight"
          curl -o profile/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=DavionG-stack&layout=compact&theme=tokyonight"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "Update stats" || exit 0
          git push
