name: Generate GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate stats
        run: |
          curl -L "https://github-readme-stats.vercel.app/api?username=DavionG-stack&show_icons=true&theme=tokyonight" -o profile/stats.svg
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=DavionG-stack&layout=compact&theme=tokyonight" -o profile/top-langs.svg

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "update stats" || exit 0
          git push
